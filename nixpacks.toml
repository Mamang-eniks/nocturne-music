# yt-dlp is installed via pip (not the nix package) and pinned to the --pre
# (nightly) channel specifically. YouTube changes its player/signature logic
# frequently, and yt-dlp ships fixes for that almost immediately on the
# nightly channel -- often days to weeks before those fixes land in a
# "stable" release or in nixpkgs' own (slower-moving) package snapshot.
# This install command runs fresh on every build, so Nocturne always starts
# up with whatever is currently the newest available fix.

[phases.setup]
nixPkgs = ["...", "python3", "python3Packages.pip"]

[phases.install]
cmds = [
  "pip install --break-system-packages -q -U --pre yt-dlp",
  "npm install --omit=dev"
]

[start]
cmd = "node src/index.js"
